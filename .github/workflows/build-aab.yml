name: Build AAB

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode signing keystore
        working-directory: twa
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > signing.keystore

      - name: Download app icon from live site
        run: |
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xhdpi
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          curl -o twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png https://k-er2.pages.dev/icon-512.png
          curl -o twa/app/src/main/res/mipmap-xxhdpi/ic_launcher.png https://k-er2.pages.dev/icon-192.png
          curl -o twa/app/src/main/res/mipmap-xhdpi/ic_launcher.png https://k-er2.pages.dev/icon-192.png
          curl -o twa/app/src/main/res/mipmap-hdpi/ic_launcher.png https://k-er2.pages.dev/icon-192.png

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Build AAB
        working-directory: twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle :app:bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: kailasa-release
          path: twa/app/build/outputs/bundle/release/app-release.aab
